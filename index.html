<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfferForge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="OfferForge interview practice">
        <aside class="side-panel" aria-label="训练设置">
          <header class="side-card title-card">
            <p class="eyebrow">OfferForge</p>
            <h1>AI 面试训练</h1>
          </header>

          <div class="side-card timer-zone" id="timerZone">
            <section class="timer-panel" id="timerPanel" aria-label="面试计时器">
              <div class="stopwatch-ring" aria-hidden="true">
                <span></span>
              </div>
              <span class="timer-label" id="timerPhase">等待问题</span>
              <strong class="timer-value" id="timerValue">00:00.000</strong>
              <div class="timer-actions">
                <button class="small-button" id="hideTimerButton" type="button">隐藏</button>
              </div>
            </section>
            <button class="timer-restore" id="showTimerButton" type="button" hidden>显示计时器</button>
          </div>

          <section class="side-card training-card" aria-label="训练配置">
            <h2>训练配置</h2>
            <div class="training-scroll">
              <div class="control-group">
                <label for="trainingModeSelect">训练方向</label>
                <select id="trainingModeSelect">
                  <option value="general">通用类问题问答</option>
                  <option value="resume">针对简历提问追问</option>
                  <option value="project">针对应聘项目个性化训练</option>
                </select>
              </div>

              <section class="resume-config" id="resumeConfig" hidden>
                <div class="control-group">
                  <label for="resumeUpload">上传简历</label>
                  <div class="upload-row">
                    <input id="resumeUpload" type="file" accept="application/pdf" />
                    <button class="small-button" id="confirmResumeUploadButton" type="button">确认上传</button>
                  </div>
                </div>
                <div class="resume-status-row">
                  <p class="config-note" id="resumeStatus">请选择文字版 PDF 简历。</p>
                  <button class="small-button clear-resume-button" id="clearResumeButton" type="button" hidden>清空</button>
                </div>
              </section>

              <div class="control-group">
                <label for="prepSecondsInput">准备时间（秒）</label>
                <input id="prepSecondsInput" type="number" min="0" max="60" step="1" value="5" />
              </div>
            </div>
          </section>

          <section class="side-card followup-card" aria-label="追问状态">
            <h2>追问状态</h2>
            <div class="followup-state" id="followupState" data-active="false">
              <span id="followupLabel">题库首问</span>
              <strong id="followupCount">0 / 4</strong>
            </div>
            <button class="small-button stop-followup-button" id="stopFollowupButton" type="button">停止追问</button>
          </section>

          <section class="side-card clear-card" aria-label="对话操作">
            <button class="danger-button" id="clearButton" type="button" aria-label="清空对话">
              <span class="trash-icon" aria-hidden="true"></span>
              清空对话
            </button>
          </section>
        </aside>

        <section class="main-panel" aria-label="训练工作区">
          <section class="chat-panel" aria-label="AI 对话区">
            <header class="chat-header">
              <div>
                <h2>模拟面试官</h2>
                <p id="connectionStatus">已连接本地代理，等待开始。</p>
              </div>
              <button class="icon-button" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
                <span id="themeIcon">☾</span>
              </button>
            </header>

            <div class="messages" id="messages" aria-live="polite"></div>

            <form class="composer" id="chatForm">
              <div class="composer-main">
                <div class="composer-tabs" role="tablist" aria-label="输入方式">
                  <button class="composer-tab" data-composer-tab="text" type="button" aria-selected="true">文本回答</button>
                  <button class="composer-tab" data-composer-tab="voice" type="button" aria-selected="false">语音录制</button>
                  <button class="composer-tab" data-composer-tab="feedback" type="button" aria-selected="false">语言表达评价</button>
                </div>

                <div class="composer-panels">
                  <section class="composer-panel" data-composer-panel="text">
                    <textarea
                      id="messageInput"
                      rows="3"
                      placeholder="输入你的回答。"
                      autocomplete="off"
                    ></textarea>
                  </section>

                  <section class="composer-panel voice-panel" id="voicePanel" data-composer-panel="voice" aria-label="语音输入">
                    <div class="voice-actions">
                      <button class="small-button voice-button" id="recordButton" type="button">开始录音</button>
                      <span class="voice-status" id="voiceStatus">录音会写入文本回答，并累计语言表达评价。</span>
                    </div>
                    <div class="voice-playback" id="voicePlayback" hidden></div>
                  </section>

                  <div class="composer-panel feedback-panel" data-composer-panel="feedback">
                    <div class="feedback-empty" id="feedbackEmpty">暂无语言表达评价</div>
                    <div class="voice-feedback" id="voiceFeedback" hidden></div>
                  </div>
                </div>
              </div>
              <button class="primary-button" id="sendButton" type="submit">发送</button>
            </form>
          </section>

          <section class="resume-panel" id="resumePanel" aria-label="简历内容" hidden>
            <header class="resume-header">
              <div>
                <h2>简历材料</h2>
                <p id="resumeHint">选择“针对简历”后上传文字版 PDF。</p>
              </div>
            </header>
            <div class="resume-viewer" id="resumeViewer">
              <div class="resume-empty">暂无简历内容</div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
