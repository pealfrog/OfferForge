<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfferForge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="OfferForge interview practice">
        <aside class="side-panel" aria-label="训练设置">
          <header class="side-card title-card">
            <p class="eyebrow">OfferForge</p>
            <h1>AI 面试训练</h1>
          </header>

          <div class="side-card timer-zone" id="timerZone">
            <section class="timer-panel" id="timerPanel" aria-label="面试计时器">
              <div class="stopwatch-ring" aria-hidden="true">
                <span></span>
              </div>
              <span class="timer-label" id="timerPhase">等待问题</span>
              <strong class="timer-value" id="timerValue">00:00.000</strong>
              <div class="timer-actions">
                <button class="small-button" id="hideTimerButton" type="button">隐藏</button>
              </div>
            </section>
            <button class="timer-restore" id="showTimerButton" type="button" hidden>显示计时器</button>
          </div>

          <section class="side-card training-card" aria-label="训练配置">
            <h2>训练配置</h2>
            <div class="training-scroll">
              <div class="control-group">
                <label for="scenarioSelect">面试场景</label>
                <select id="scenarioSelect">
                  <option value="保研面试">保研面试</option>
                  <option value="就业面试">就业面试</option>
                  <option value="项目经历追问">项目经历追问</option>
                  <option value="通用压力面试">通用压力面试</option>
                </select>
              </div>

              <div class="control-group">
                <label for="roleInput">目标方向</label>
                <input id="roleInput" type="text" value="计算机专业大三学生" autocomplete="off" />
              </div>

              <div class="control-group">
                <label for="profileInput">个人背景</label>
                <textarea id="profileInput" rows="5" placeholder="例如：熟悉 Java，做过推荐系统项目，准备保研夏令营。"></textarea>
              </div>

              <div class="control-group">
                <label for="prepSecondsInput">准备时间（秒）</label>
                <input id="prepSecondsInput" type="number" min="0" max="60" step="1" value="5" />
              </div>
              <div class="hint-list" aria-label="训练要点">
                <div>
                  <strong>当前能力</strong>
                  <span>基础多轮交流</span>
                </div>
                <div>
                  <strong>回答风格</strong>
                  <span>面试官追问 + 简短反馈</span>
                </div>
              </div>
            </div>
          </section>

          <section class="side-card clear-card" aria-label="对话操作">
            <button class="ghost-button" id="clearButton" type="button">清空对话</button>
          </section>
        </aside>

        <section class="chat-panel" aria-label="AI 对话区">
          <header class="chat-header">
            <div>
              <h2>模拟面试官</h2>
              <p id="connectionStatus">已连接本地代理，等待开始。</p>
            </div>
            <button class="icon-button" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
              <span id="themeIcon">☾</span>
            </button>
          </header>

          <div class="messages" id="messages" aria-live="polite"></div>

          <form class="composer" id="chatForm">
            <textarea
              id="messageInput"
              rows="3"
              placeholder="输入你的回答或请求，例如：请先问我一个关于项目经历的问题。"
              autocomplete="off"
            ></textarea>
            <button class="primary-button" id="sendButton" type="submit">发送</button>
          </form>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
